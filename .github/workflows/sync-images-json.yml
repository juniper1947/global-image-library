name: Sync images.json

on:
  push:
    branches:
      - main
    paths:
      - "docs/uploads/**"
      - ".github/workflows/sync-images-json.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rebuild docs/images.json from docs/uploads
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/uploads
          mapfile -t files < <(
            find docs/uploads -maxdepth 1 -type f -print \
              | sed 's#^docs/uploads/##' \
              | LC_ALL=C sort
          )

          {
            echo "["
            if [ "${#files[@]}" -gt 0 ]; then
              last_index="$((${#files[@]} - 1))"
              for i in "${!files[@]}"; do
                escaped="${files[$i]//\\/\\\\}"
                escaped="${escaped//\"/\\\"}"
                if [ "$i" -lt "$last_index" ]; then
                  printf '  "%s",\n' "$escaped"
                else
                  printf '  "%s"\n' "$escaped"
                fi
              done
            fi
            echo "]"
          } > docs/images.json

      - name: Commit if changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- docs/images.json; then
            echo "No changes in docs/images.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/images.json
          git commit -m "chore: sync docs/images.json from docs/uploads"
          git push
